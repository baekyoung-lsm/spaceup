spring:
    # ⭐ 이 프로필은 DB에 실제로 붙지 않고도 Hibernate가 엔티티를 스캔해서 CREATE TABLE DDL을 파일로
    # 뽑아주는 용도입니다. 제가 손으로 DDL을 직접 작성하면 실수할 위험이 있어서, 대신 Hibernate 본인이
    # 정확한 스키마를 생성하도록 이 방식을 선택했습니다.
    jpa:
        hibernate:
            ddl-auto: none
        properties:
            jakarta:
                persistence:
                    schema-generation:
                        scripts:
                            action: create
                            create-target: src/main/resources/db/migration/V1__init.sql
            hibernate:
                hbm2ddl:
                    delimiter: ";"
