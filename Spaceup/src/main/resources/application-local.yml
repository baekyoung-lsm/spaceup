spring:
    datasource:
        url: jdbc:mysql://localhost:3306/template?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
        driver-class-name: com.mysql.cj.jdbc.Driver
        username: root
        password: 12345

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true

    # ⭐ Flyway를 새로 도입했습니다. 지금 당장은 db/migration에 파일이 없어서 아무 동작도 안 하고
    # (ddl-auto: update가 계속 스키마를 관리), V1 마이그레이션 파일을 만든 뒤에 ddl-auto를 validate로
    # 바꾸면 그때부터 Flyway가 실제로 스키마를 관리하게 됩니다. 자세한 절차는 PROGRESS.md 참고.
    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        baseline-version: 0

file:
    upload-dir: C:/upload/

jwt:
    secret: local-dev-secret-key-change-in-production-environment-32bytes-이상
    expiration-ms: 3600000
